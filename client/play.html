<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Warzone — Playable Demo (no build)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0e0f14; overflow: hidden; }
    #game { width: 100vw; height: 100vh; }
    canvas { display: block; }
    #hint { position: fixed; left: 50%; bottom: 6px; transform: translateX(-50%);
      font: 11px monospace; color: #6b7080; z-index: 5; pointer-events: none; }
  </style>
  <!-- Load Phaser as a UMD global, then map the bare "phaser" import to a
       shim that re-exports it — so this runs with NO build step. The Vite
       project (index.html) uses the real npm package instead. -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="importmap">
  { "imports": { "phaser": "./phaser-shim.js" } }
  </script>
</head>
<body>
  <div id="game"></div>
  <div id="hint">Pick a defense ↓ · click grass to deploy · START WAVE ↗ · ESC to cancel</div>
  <!-- assets live under /public in this repo; tell the loader where -->
  <script>window.ASSET_BASE = 'public/';</script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
